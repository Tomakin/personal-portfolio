# Production backend (uncomment when deploying)
# backend:
#   name: github
#   repo: tomakin/personal-portfolio
#   branch: main
#   base_url: https://decap-oauth.netlify.app

# Local development - writes directly to file system
local_backend: true
backend:
  name: git-gateway

media_folder: public/images/post
public_folder: /images/post

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Categories", name: "categories", widget: "list", default: ["programming"] }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
